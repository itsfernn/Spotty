name: spotty-snapshots

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  flatpak:
    name: "Flatpak"
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-50
      options: --privileged
    strategy:
      matrix:
        variant:
          - arch: x86_64
          - arch: aarch64
    steps:
    - uses: actions/checkout@v4
    - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
      with:
        bundle: spotty-${{ matrix.variant.arch }}.flatpak
        manifest-path: dev.itsfernn.Spotty.snapshots.json
        arch: ${{ matrix.variant.arch }}
        cache-key: flatpak-builder-${{ github.sha }}
    - uses: actions/upload-artifact@v4
      with:
        name: "Spotty Development Build #${{ github.run_number }}"
        path: spotty-${{ matrix.variant.arch }}.flatpak
        include-hidden-files: true
    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          - `spotty-x86_64.flatpak` - x86_64 build
          - `spotty-aarch64.flatpak` - ARM64 build (postmarketOS, PinePhone, etc.)
